<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Отчет о правах доступа Samba</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Тема оформления (совпадает с Crimson Red) */
        :root {
            --bg-main: #0a0a0c;
            --bg-card: #121216;
            --border-color: rgba(227, 71, 74, 0.12);
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --accent: #c52f31;
            --accent-hover: #e3474a;
            
            --success: #10b981;
            --danger: #ef4444;
            --warning: #fbbf24;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            padding: 40px 24px;
            min-height: 100vh;
        }

        .report-container {
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
        }

        /* Заголовок отчета */
        .report-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 32px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 24px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .report-title h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .report-title p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .meta-info {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 16px 24px;
            border-radius: 8px;
            font-size: 13px;
            line-height: 1.5;
            color: var(--text-muted);
        }

        .meta-info strong {
            color: var(--text-main);
        }

        /* Кнопка печати */
        .btn-print {
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            color: white;
            border: none;
            border-radius: 6px;
            padding: 10px 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(197, 47, 49, 0.2);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-print:hover {
            transform: translateY(-1px);
            filter: brightness(1.1);
        }

        /* Кнопка Excel */
        .btn-excel {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 10px 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-excel:hover {
            transform: translateY(-1px);
            filter: brightness(1.1);
        }

        /* Таблица матрицы */
        .table-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        }

        .table-wrapper {
            overflow-x: auto;
            width: 100%;
        }

        .matrix-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        .matrix-table th {
            padding: 16px 20px;
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border-color);
            background-color: rgba(0, 0, 0, 0.15);
            white-space: nowrap;
        }

        .matrix-table td {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
        }

        /* Поведение строк таблицы при ховере */
        .matrix-table tbody tr:hover td {
            background-color: rgba(255, 255, 255, 0.008);
        }

        /* Закрепление первого столбца матрицы (Общая папка / Путь) */
        .matrix-table th:first-child,
        .matrix-table td:first-child {
            position: sticky;
            left: 0;
            z-index: 10;
            background-color: var(--bg-card); /* Сплошной фон, чтобы имена пользователей не просвечивали */
            box-shadow: 4px 0 10px rgba(0, 0, 0, 0.35); /* Красивая тень справа */
        }

        .matrix-table th:first-child {
            background-color: #16161c; /* Чуть более темный оттенок для заголовка */
            z-index: 11; /* Выше ячеек тела таблицы, чтобы заголовки не перекрывались */
        }

        .matrix-table tbody tr:hover td:first-child {
            background-color: #17171d !important; /* Подсветка при ховере */
        }

        /* Данные папки */
        .share-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 250px;
        }

        .share-name {
            font-size: 15px;
            font-weight: 600;
            color: white;
        }

        .share-path {
            font-size: 11px;
            color: var(--text-muted);
            font-family: monospace;
        }

        /* Данные пользователя */
        .user-header-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 110px;
        }

        .user-header-fullname {
            font-size: 13px;
            font-weight: 600;
            color: white;
        }

        .user-header-username {
            font-size: 11px;
            color: var(--text-muted);
            font-family: monospace;
        }

        /* Статические бейджи прав */
        .perm-badge {
            font-size: 11px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 6px;
            display: inline-block;
            text-align: center;
        }

        .perm-badge.rw {
            background-color: rgba(197, 47, 49, 0.15);
            color: var(--accent-hover);
            border: 1px solid rgba(197, 47, 49, 0.25);
        }

        .perm-badge.ro {
            background-color: rgba(251, 191, 36, 0.08);
            color: var(--warning);
            border: 1px solid rgba(251, 191, 36, 0.2);
        }

        .perm-badge.none {
            color: var(--text-muted);
            font-weight: 400;
        }

        .text-muted-italic {
            color: var(--text-muted);
            font-style: italic;
            font-size: 12px;
        }

        @page {
            size: landscape;
            margin: 10mm;
        }

        /* Стили для печати (при экспорте в PDF/Печати делаем отчет на белом фоне) */
        @media print {
            body {
                background: white !important;
                color: black !important;
                padding: 0 !important;
            }

            .btn-print {
                display: none !important;
            }

            .table-card, .table-wrapper {
                background: white !important;
                border: none !important;
                box-shadow: none !important;
                padding: 0 !important;
                overflow: visible !important;
                width: 100% !important;
            }

            .matrix-table {
                width: 100% !important;
                table-layout: auto !important;
                border: 1px solid #ddd !important;
            }

            .matrix-table th {
                background-color: #f5f5f5 !important;
                color: #333 !important;
                border-bottom: 2px solid #ccc !important;
                padding: 6px 8px !important;
                font-size: 10px !important;
                white-space: normal !important;
            }

            .matrix-table td {
                border-bottom: 1px solid #eee !important;
                padding: 6px 8px !important;
                font-size: 10px !important;
            }

            .share-name {
                color: black !important;
                font-size: 11px !important;
            }

            .share-path {
                color: #666 !important;
                font-size: 9px !important;
            }

            .user-header-fullname {
                color: black !important;
                font-size: 10px !important;
                white-space: normal !important;
                max-width: 90px !important;
                word-wrap: break-word !important;
            }

            .user-header-username {
                color: #666 !important;
                font-size: 9px !important;
            }

            .report-title p, .meta-info {
                color: #666 !important;
            }

            .meta-info {
                background: white !important;
                border: 1px solid #ddd !important;
            }

            .meta-info strong {
                color: black !important;
            }

            .perm-badge {
                border: 1px solid #ccc !important;
                background: transparent !important;
                padding: 2px 6px !important;
                font-size: 9px !important;
            }

            .perm-badge.rw {
                color: #c52f31 !important;
                border-color: #c52f31 !important;
            }

            .perm-badge.ro {
                color: #b45309 !important;
                border-color: #fbbf24 !important;
            }

            .perm-badge.none {
                color: #aaa !important;
                border: none !important;
            }
        }

        /* Tree layout for folder columns */
        .share-info-tree {
            display: flex;
            align-items: center;
            position: relative;
            padding-top: 4px;
            padding-bottom: 4px;
        }

        .tree-toggle {
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 20px;
            margin-right: 6px;
            color: var(--accent-hover);
            user-select: none;
            transition: all 0.2s ease;
            border-radius: 4px;
        }

        .tree-toggle:hover {
            background-color: rgba(255, 255, 255, 0.08);
            color: white;
        }

        .tree-toggle.collapsed svg {
            transform: rotate(-90deg);
        }

        .tree-toggle svg {
            transition: transform 0.2s ease;
            width: 14px;
            height: 14px;
        }

        .tree-toggle-spacer {
            display: inline-block;
            width: 26px;
        }

        .share-name-tree {
            font-weight: 500;
            color: white;
            font-size: 13px;
        }

        .share-path-tree {
            font-size: 10px;
            color: var(--text-muted);
            font-family: monospace;
            margin-left: 8px;
            opacity: 0.7;
        }

        .tree-indent-line {
            position: absolute;
            top: -14px;
            bottom: -14px;
            width: 1px;
            background-color: var(--border-color);
            opacity: 0.3;
        }
    </style>
</head>
<body>

    <div class="report-container">
        
        <div class="report-header">
            <div class="report-title">
                <h1>Отчет о правах доступа Samba</h1>
                <p>Экспорт прав доступа сотрудников к сетевым каталогам</p>
                <div style="margin-top: 16px;">
                    <button class="btn-excel" onclick="downloadExcel()">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                        Скачать в Excel
                    </button>
                </div>
            </div>
            
            <div class="meta-info">
                <p>Описание: <strong>{{ description or 'Не указано' }}</strong></p>
                <p>Создан: <strong id="createdAtVal">...</strong></p>
                <p>Действителен до: <strong id="expiresAtVal">...</strong></p>
            </div>
        </div>

        <div class="table-card">
            <div class="table-wrapper">
                <table class="matrix-table" id="matrixTable">
                    <thead>
                        <tr id="matrixHeader">
                            <th>Общая папка / Путь</th>
                        </tr>
                    </thead>
                    <tbody id="matrixBody">
                        <tr><td colspan="100%" style="text-align: center; padding: 24px; color: var(--text-muted);">Загрузка отчета...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        const TOKEN = "{{ token }}";
        const EXPIRES_AT = "{{ expires_at }}";
        
        let sharesData = [];
        let usersData = [];
        let matrixData = {};
        let collapsedState = {};

        function downloadExcel() {
            window.location.href = `/api/shared/matrix/${TOKEN}/export`;
        }
        
        // Форматирование дат
        function formatISO(isoStr) {
            if (!isoStr) return '—';
            try {
                const date = new Date(isoStr);
                return date.toLocaleString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
            } catch(e) {
                return isoStr;
            }
        }

        document.getElementById('expiresAtVal').innerText = formatISO(EXPIRES_AT);
        document.getElementById('createdAtVal').innerText = new Date().toLocaleString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });

        // Переключение сворачивания папки
        window.toggleFolder = function(shareName, event) {
            if (event) event.stopPropagation();
            collapsedState[shareName] = !collapsedState[shareName];
            renderReportTable();
        };

        function isShareHidden(share) {
            let parent = share.parent;
            while (parent) {
                if (collapsedState[parent]) {
                    return true;
                }
                const parentObj = sharesData.find(s => s.name === parent);
                parent = parentObj ? parentObj.parent : null;
            }
            return false;
        }

        async function loadReportData() {
            const tbody = document.getElementById('matrixBody');
            try {
                const res = await fetch(`/api/shared/matrix/${TOKEN}`);
                const data = await res.json();
                
                if (!res.ok) {
                    tbody.innerHTML = `<tr><td colspan="100%" style="text-align: center; padding: 24px; color: var(--danger);">Ошибка: ${data.error}</td></tr>`;
                    return;
                }

                sharesData = data.shares;
                usersData = data.users;
                matrixData = data.matrix;

                // Сортировка по имени
                usersData.sort((a, b) => {
                    const nameA = (a.full_name || a.username).toLowerCase();
                    const nameB = (b.full_name || b.username).toLowerCase();
                    return nameA.localeCompare(nameB);
                });

                renderReportTable();
            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="100%" style="text-align: center; padding: 24px; color: var(--danger);">Не удалось загрузить данные отчета</td></tr>`;
            }
        }

        function renderReportTable() {
            const tbody = document.getElementById('matrixBody');
            const header = document.getElementById('matrixHeader');
            
            // Строим заголовки
            header.innerHTML = '<th>Общая папка / Путь</th>';
            const activeUsers = usersData.filter(u => !u.disabled);
            
            activeUsers.forEach(user => {
                const th = document.createElement('th');
                th.innerHTML = `
                    <div class="user-header-info">
                        <span class="user-header-fullname">${user.full_name || '—'}</span>
                        <span class="user-header-username">${user.username}</span>
                    </div>
                `;
                header.appendChild(th);
            });

            // Строим строки
            tbody.innerHTML = '';
            sharesData.forEach(share => {
                if (isShareHidden(share)) {
                    return;
                }
                
                const tr = document.createElement('tr');
                
                const depth = share.depth || 0;
                const hasChildren = share.has_children;
                const isCollapsed = collapsedState[share.name] || false;
                
                const tdShare = document.createElement('td');
                
                let toggleHtml = '';
                if (hasChildren) {
                    toggleHtml = `
                        <span class="tree-toggle ${isCollapsed ? 'collapsed' : ''}" onclick="toggleFolder('${share.name}', event)">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="6 9 12 15 18 9"></polyline>
                            </svg>
                        </span>
                    `;
                } else {
                    toggleHtml = '<span class="tree-toggle-spacer"></span>';
                }
                
                let indentLinesHtml = '';
                for (let i = 0; i < depth; i++) {
                    indentLinesHtml += `<span class="tree-indent-line" style="left: ${i * 26 + 18}px;"></span>`;
                }
                
                tdShare.innerHTML = `
                    <div class="share-info-tree" style="padding-left: ${depth * 26}px;">
                        ${indentLinesHtml}
                        ${toggleHtml}
                        <div>
                            <div class="share-name-tree">${share.display_name || share.name}</div>
                            <div class="share-path-tree">${share.path}</div>
                        </div>
                    </div>
                `;
                tr.appendChild(tdShare);

                // Права
                activeUsers.forEach(user => {
                    const tdPerm = document.createElement('td');
                    const currentAccess = (matrixData[user.username] && matrixData[user.username][share.name]) || 'none';
                    const isConfigured = share.rw_group || share.ro_group;

                    if (!isConfigured) {
                        tdPerm.innerHTML = `<span class="text-muted-italic">Без ограничений</span>`;
                    } else {
                        if (currentAccess === 'rw') {
                            tdPerm.innerHTML = `<span class="perm-badge rw">RW</span>`;
                        } else if (currentAccess === 'ro') {
                            tdPerm.innerHTML = `<span class="perm-badge ro">RO</span>`;
                        } else {
                            tdPerm.innerHTML = `<span class="perm-badge none">—</span>`;
                        }
                    }
                    tr.appendChild(tdPerm);
                });

                tbody.appendChild(tr);
            });
        }

        window.addEventListener('load', loadReportData);
    </script>
</body>
</html>
